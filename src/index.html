<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>KIS update Automation by Sezam</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  body {
    background: rgba(8, 12, 20, 0.40);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    color: white;
  }

  .widget {
    width: calc(100% - 2px);
    box-sizing: border-box;
    margin-top: 1px;
    padding: 10px;
    border-radius: 7px;
    background: rgba(12, 18, 28, 0);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    user-select: none;
  }

  .inner {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 10px 10px 5px;
    border-radius: 6px;
    background: rgba(10, 10, 10, 0.72);
  }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 30px;
    margin: 5px 0;
    font-size: 16px;
    line-height: 1.2;
    white-space: nowrap;
  }

  .time {
    width: 46px;
    min-width: 46px;
    text-align: left;
    font-weight: 700;
    color: #f5f5f5;
  }

  .label {
    min-width: 42px;
    font-weight: 750;
    margin-left: -2px;
  }

  .label.uude { color: #ff9f43; }
  .label.nyc  { color: #8fd3ff; }

  .text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row.uude .text { color: #ffb067; }
  .row.nyc .text  { color: #a9ddff; }

  .row.done { opacity: 0.42; }
  .row.future { opacity: 0.82; }

  .row.current {
    opacity: 1;
  }

  .row.current .time,
  .row.current .label,
  .row.current .text {
    color: #ffe92e !important;
    font-weight: 700;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 8px;
  }

  .hint {
    margin: 0;
    font-size: 12px;
    line-height: 1;
    color: rgba(255, 255, 255, 0.33);
  }

  .version {
    margin: 0;
    font-size: 12px;
    line-height: 1;
    color: rgba(255, 255, 255, 0.25);
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="widget" id="widget">
  <div class="inner" id="inner">
    <div id="list"></div>
  </div>

  <div class="footer">
    <div class="hint" id="hint">Колесо мыши: прозрачность 70%</div>
    <div class="version" id="version">ver. 1.0</div>
  </div>
</div>

<script>
const events = [
  { time: "11:00", place: "UUde", text: "Скачивание антивирусных баз" },
  { time: "11:50", place: "UUde", text: "D:\\KISbases\\Temp - папка не пуста - Pushbullet/Telegram" },
  { time: "12:15", place: "UUde", text: "D:\\KISbases\\Bases - папка пуста - закачка баз с помощью CLI" },
  { time: "13:00", place: "UUde", text: "Архивация, перенос архива по папкам, удаление старых баз" },
  { time: "13:40", place: "UUde", text: "Upload bases.zip на хостинг SZAM.RU (FTP)" },
  { time: "14:30", place: "NYC",  text: "Bases.zip - есть - do nothing or download from SZAM.RU (FTP)" },
  { time: "15:00", place: "NYC",  text: "C:\\KISbases\\Out - удаляет содержимое" },
  { time: "15:10", place: "NYC",  text: "Распаковывает bases.zip и переносит в C:\\KISbases\\Out" }
];

const widget = document.getElementById("widget");
const inner = document.getElementById("inner");
const list = document.getElementById("list");
const hint = document.getElementById("hint");

let opacity = 0.70;
const minOpacity = 0.00;
const maxOpacity = 0.95;
const step = 0.05;

function toMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function getNowMinutes() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function getSortedEventsWithOriginalIndex() {
  return events
    .map((event, index) => ({
      ...event,
      originalIndex: index,
      minutes: toMinutes(event.time)
    }))
    .sort((a, b) => a.minutes - b.minutes);
}

function getCurrentOriginalIndex(nowMinutes) {
  const sortedEvents = getSortedEventsWithOriginalIndex();

  for (let i = 0; i < sortedEvents.length; i++) {
    const current = sortedEvents[i];
    const next = sortedEvents[i + 1];

    if (next) {
      if (nowMinutes >= current.minutes && nowMinutes < next.minutes) {
        return current.originalIndex;
      }
    } else {
      if (nowMinutes >= current.minutes && nowMinutes < current.minutes + 2) {
        return current.originalIndex;
      }
    }
  }

  return -1;
}

function render() {
  const now = getNowMinutes();
  const currentIndex = getCurrentOriginalIndex(now);

  list.innerHTML = "";

  events.forEach((event, index) => {
    const row = document.createElement("div");
    const placeClass = event.place === "UUde" ? "uude" : "nyc";

    let stateClass = "future";

    if (currentIndex !== -1) {
      if (index < currentIndex) stateClass = "done";
      if (index === currentIndex) stateClass = "current";
    }

    row.className = `row ${placeClass} ${stateClass}`;

    row.innerHTML = `
      <div class="time">${event.time}</div>
      <div class="label ${placeClass}">${event.place}</div>
      <div class="text">${event.text}</div>
    `;

    list.appendChild(row);
  });
}

function applyOpacity() {
  inner.style.background = `rgba(10, 10, 10, ${opacity})`;
  hint.innerText = `Колесо мыши: прозрачность ${Math.round(opacity * 100)}%`;
}

widget.addEventListener("wheel", function (e) {
  e.preventDefault();

  if (e.deltaY < 0) {
    opacity = Math.min(maxOpacity, opacity + step);
  } else {
    opacity = Math.max(minOpacity, opacity - step);
  }

  applyOpacity();
}, { passive: false });

applyOpacity();
render();
setInterval(render, 5000);
</script>

</body>
</html>
